package:
  name: juniorcloud-bitnet-mlx
  version: "20.0.0"

source:
  path: ..

build:
  noarch: python
  script: python -m pip install . -vv

requirements:
  host:
    - python >=3.11
    - pip
    - setuptools
  run:
    - python >=3.11
    - mlx >=0.10.0
    - mlx-lm >=0.12.0
    - numpy >=1.24.0
    - huggingface_hub >=0.23.0
    - pyarrow >=12.0.0
    - pandas >=2.0.0
    - prometheus_client >=0.17.0
    - psutil >=5.9.0
    - fastapi >=0.100.0
    - uvicorn >=0.23.0
    - httpx >=0.24.0
