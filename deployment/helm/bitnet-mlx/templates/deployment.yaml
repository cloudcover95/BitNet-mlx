apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bitnet-mlx.fullname" . }}
  labels:
    app: {{ .Chart.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: model-assets
              mountPath: /opt/juniorcloud/bitnet-mlx/assets
              readOnly: true
      volumes:
        - name: model-assets
          hostPath:
            path: {{ .Values.modelAssets.hostPath }}
            type: DirectoryOrCreate
