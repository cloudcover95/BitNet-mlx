[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bitnet_mlx"
version = "29.0.0"
description = "High-performance MLX-native ternary (1.58-bit) SDK for LLMs & VLMs."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "JuniorCloud LLC", email = "open-source@juniorcloud.com"}]

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "black", "isort", "pyarrow>=12.0.0", "pandas>=2.0.0"]

[project.scripts]
bitnet-mlx = "bitnet_mlx.cli:main"
