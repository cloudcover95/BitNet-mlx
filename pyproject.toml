[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "bitnet_mlx"
version = "39.0.0"
description = "Google-Grade MLX ternary (1.58-bit) SDK and Topology Converter."
readme = "README.md"
requires-python = ">=3.9"
keywords = ["mlx", "bitnet", "1.58-bit", "apple-silicon", "quantization"]
authors = [{name = "JuniorCloud LLC"}]
dependencies = [
    "mlx>=0.14.0",
    "mlx-lm>=0.12.0",
    "pyarrow>=12.0.0",
    "pandas>=2.0.0",
    "psutil>=5.9.0"
]

[project.scripts]
bitnet-mlx = "bitnet_mlx.cli.main:main"
